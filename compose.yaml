services:
  postgres:
    image: postgres:17.9-alpine3.23
    container_name: upmodel-postgres
    environment:
      POSTGRES_DB: upmodel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '2102:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d upmodel']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: upmodel-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '2105:9000'
      - '2106:9001'
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint:
      [
        '/bin/sh',
        '-c',
        'until mc alias set local http://minio:9000 minio minio123; do sleep 1; done; mc mb -p local/upmodel-assets || true'
      ]
    restart: 'no'

  mailpit:
    image: axllent/mailpit:v1.29.4
    container_name: upmodel-mailpit
    ports:
      - '2103:1025'
      - '2104:8025'

  ollama:
    image: ollama/ollama:latest
    container_name: upmodel-ollama
    ports:
      - '2107:11434'
    volumes:
      - ollama-data:/root/.ollama

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: upmodel-web
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/upmodel
      OLLAMA_BASE_URL: http://ollama:11434
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailpit
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - '2101:2101'
    volumes:
      - .:/app
      - /app/node_modules
    command: bun run dev -- --host 0.0.0.0 --port 2101

volumes:
  postgres-data:
  minio-data:
  ollama-data:
